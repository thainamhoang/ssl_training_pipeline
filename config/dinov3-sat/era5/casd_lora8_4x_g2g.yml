global_vars:
  lr_deg: 5.625
  hr_deg: 1.40625
  var: 2m_temperature
  seed: 3407

data:
  type: era5
  lr_dir: /scratch/izar/hoang/SSL/data/${global_vars.lr_deg}deg/${global_vars.var}
  hr_dir: /scratch/izar/hoang/SSL/data/${global_vars.hr_deg}deg/${global_vars.var}
  stride: 6
  preload: false
  batch_size: 32
  num_workers: 6
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2

model:
  mode: casd_lora
  model_id: dinov3-sat
  upscale: 4
  tap_layers: [4, 7, 14]
  proj_dim: 128
  n_heads: 4
  n_ca_layers: 1
  ca_dropout: 0.0
  use_static: false       # set true when constants.npz confirmed
  lora_r: 8               # only used when mode=casd_lora
  lora_alpha: 16          # only used when mode=casd_lora
  lora_dropout: 0.0       # only used when mode=casd_lora

training:
  max_epochs: 80
  lr: 5e-5                # LoRA LR (ignored for casd_frozen)
  decoder_lr: 2e-4        # decoder LR (used for all CASD modes)
  weight_decay: 1e-2
  patience: 10
  warmup_epochs: 5
  grad_accum_steps: 4
  ckpt_dir: /scratch/izar/hoang/SSL/checkpoints/${data.type}/${model.model_id}/${model.mode}

wandb:
  entity: thainamhoang
  project: SSL Climate
  name: ${model.mode}_${model.model_id}_${model.upscale}x_${global_vars.lr_deg}deg_${global_vars.hr_deg}deg


